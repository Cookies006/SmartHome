<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartHome - Onglet Famille Complet</title>
    <style>
        :root {
            --bg-app: #F8FAFC;
            --blue-soft: #6A8EAE;
            --blue-dark: #3E5C76;
            --blue-light: #F0F4F8;
            --blue-border: #D9E4EC;
            --text-dark: #2C3E50;
            --text-muted: #788A9C;
            --danger-color: #E63946;
            --white: #FFFFFF;
            --success-color: #2D6A4F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-app); display: flex; flex-direction: column; height: 100vh; }

        /* Header avec Titre et Bouton Inviter */
        header { 
            background-color: var(--white); padding: 30px 24px 20px; 
            border-bottom: 1px solid var(--blue-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 24px; color: var(--text-dark); font-weight: 800; }
        
        .btn-invite {
            background-color: var(--blue-dark); color: white;
            border: none; padding: 10px 18px; border-radius: 12px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 10px rgba(62, 92, 118, 0.2);
        }

        .content { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 100px; }

        /* Section Membres */
        .section-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; display: flex; justify-content: space-between; }
        .count-badge { background: var(--blue-light); color: var(--blue-dark); padding: 2px 10px; border-radius: 12px; font-size: 12px; }
        
        .member-card {
            background-color: var(--white); padding: 16px; border-radius: 18px;
            border: 1px solid var(--blue-border); display: flex; align-items: center; gap: 16px;
            margin-bottom: 12px; transition: all 0.3s ease;
        }
        .member-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background-color: var(--blue-light); display: flex; justify-content: center; align-items: center; font-size: 24px;
        }
        .member-info { flex: 1; }
        .member-name { font-size: 16px; font-weight: 700; color: var(--text-dark); }
        .member-role { font-size: 13px; color: var(--text-muted); }
        
        /* Bouton suppression (Corbeille) */
        .btn-delete {
            background-color: #FFF5F5; color: var(--danger-color);
            border: 1px solid #FFE5E5; width: 42px; height: 42px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px;
        }

        /* MODALE DE CONFIRMATION */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.5); z-index: 100;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            background: white; padding: 24px; border-radius: 24px; width: 100%; max-width: 320px;
            text-align: center;
        }
        .modal h2 { font-size: 18px; margin-bottom: 12px; color: var(--text-dark); }
        .modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .modal-btns { display: flex; gap: 12px; }
        .btn-confirm { flex: 1; background: var(--danger-color); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-cancel { flex: 1; background: var(--blue-light); color: var(--blue-dark); border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* TOAST DE SUCCÈS */
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--text-dark); color: white; padding: 12px 24px;
            border-radius: 30px; font-size: 14px; display: none; z-index: 200;
        }

        /* Nav Bas */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--blue-border); display: flex; justify-content: space-around; padding: 12px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--blue-dark); font-weight: 700; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>Famille</h1>
        <button class="btn-invite" onclick="alert('Action : Inviter un membre')">+ Inviter</button>
    </header>

    <main class="content">
        <div class="section-title">
            Membres du foyer
            <span class="count-badge" id="memberCount">3 membres</span>
        </div>
        
        <div id="membersList">
            <div class="member-card">
                <div class="member-avatar">👩</div>
                <div class="member-info">
                    <p class="member-name">Julie (Maman)</p>
                    <p class="member-role">Administrateur</p>
                </div>
            </div>

            <div class="member-card" id="mem-1">
                <div class="member-avatar">👨</div>
                <div class="member-info">
                    <p class="member-name">Thomas</p>
                    <p class="member-role">Parent</p>
                </div>
                <button class="btn-delete" onclick="askRemoval('Thomas', 'mem-1')">🗑️</button>
            </div>

            <div class="member-card" id="mem-2">
                <div class="member-avatar">👦</div>
                <div class="member-info">
                    <p class="member-name">Léo</p>
                    <p class="member-role">Enfant</p>
                </div>
                <button class="btn-delete" onclick="askRemoval('Léo', 'mem-2')">🗑️</button>
            </div>
        </div>
    </main>

    <div class="overlay" id="confirmOverlay">
        <div class="modal">
            <h2 id="modalTitle">Retirer ce membre ?</h2>
            <p>Le membre n'aura plus accès à la liste de courses de la famille.</p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Annuler</button>
                <button class="btn-confirm" onclick="executeRemoval()">Retirer</button>
            </div>
        </div>
    </div>

    <div class="toast" id="successToast">✅ Membre retiré du foyer</div>

    <nav class="bottom-nav">
        <div class="nav-item"><span class="nav-icon">📊</span>Accueil</div>
        <div class="nav-item"><span class="nav-icon">🛒</span>Courses</div>
        <div class="nav-item active"><span class="nav-icon">👨‍👩‍👧‍👦</span>Famille</div>
    </nav>

    <script>
        let memberToTarget = null;

        function askRemoval(name, id) {
            memberToTarget = id;
            document.getElementById('modalTitle').innerText = "Retirer " + name + " ?";
            document.getElementById('confirmOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('confirmOverlay').style.display = 'none';
        }

        function executeRemoval() {
            if(memberToTarget) {
                const el = document.getElementById(memberToTarget);
                el.style.opacity = '0';
                el.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    el.remove();
                    updateCount();
                    showToast();
                }, 300);
            }
            closeModal();
        }

        function updateCount() {
            const count = document.querySelectorAll('.member-card').length;
            document.getElementById('memberCount').innerText = count + " membres";
        }

        function showToast() {
            const toast = document.getElementById('successToast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }
    </script>
</body>
</html>

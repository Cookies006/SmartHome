<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartHome - Rejoindre une famille</title>
    <style>
        :root {
            --bg-app: #FFFFFF;
            --blue-soft: #6A8EAE;
            --blue-dark: #3E5C76;
            --blue-light: #F0F4F8;
            --blue-border: #D9E4EC;
            --text-dark: #2C3E50;
            --text-muted: #788A9C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-app);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Barre de navigation supérieure */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--blue-border);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
        }

        .top-bar h1 {
            font-size: 18px;
            color: var(--text-dark);
            font-weight: 700;
        }

        /* Contenu principal */
        .content {
            flex: 1;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .illustration {
            font-size: 64px;
            background-color: var(--blue-light);
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-bottom: 24px;
            border: 2px solid var(--blue-border);
        }

        .instructions h2 {
            font-size: 24px;
            color: var(--text-dark);
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
        }

        .instructions p {
            font-size: 15px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        /* Saisie du code */
        .code-input-wrapper {
            width: 100%;
            margin-bottom: 24px;
        }

        .code-input {
            width: 100%;
            padding: 20px;
            font-size: 28px;
            letter-spacing: 8px;
            text-align: center;
            text-transform: uppercase;
            border: 2px dashed var(--blue-soft);
            border-radius: 16px;
            background-color: var(--blue-light);
            color: var(--text-dark);
            font-weight: 700;
            outline: none;
            transition: all 0.2s;
        }

        .code-input:focus {
            border-style: solid;
            border-color: var(--blue-dark);
            background-color: var(--bg-app);
            box-shadow: 0 4px 15px rgba(106, 142, 174, 0.1);
        }

        .code-input::placeholder {
            color: #A0B2C1;
            letter-spacing: 2px;
            font-size: 20px;
            font-weight: 500;
        }

        /* Boutons d'action */
        .btn-primary {
            width: 100%;
            background-color: var(--blue-dark);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:active {
            background-color: var(--text-dark);
        }

        /* Séparateur */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
            width: 100%;
            margin: 24px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--blue-border);
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        /* Bouton secondaire (QR Code) */
        .btn-secondary {
            width: 100%;
            background-color: var(--bg-app);
            color: var(--text-dark);
            border: 1px solid var(--blue-border);
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-secondary span {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <button class="back-btn">←</button>
        <h1>Rejoindre une famille</h1>
    </header>

    <div class="content">
        <div class="illustration">🤝</div>
        
        <div class="instructions">
            <h2>Code d'invitation</h2>
            <p>Saisissez le code à 6 caractères que le parent administrateur vous a partagé pour rejoindre sa famille.</p>
        </div>

        <div class="code-input-wrapper">
            <input type="text" class="code-input" placeholder="EX: A1B2C3" maxlength="6">
        </div>

        <button class="btn-primary">Rejoindre la famille</button>

        <div class="divider">ou</div>

        <button class="btn-secondary">
            <span>📷</span> Scanner un QR Code
        </button>
    </div>

</body>
</html>

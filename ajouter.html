<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajouter un produit — FamilyPriority</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE; --green-mid: #9FE1CB;
    --red: #E24B4A; --red-light: #FCEBEB; --red-dark: #A32D2D;
    --amber: #BA7517; --amber-light: #FAEEDA;
    --gray-bg: #F5F5F2; --gray-border: #E8E6DE; --gray-text: #888780; --text: #1a1a18; --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-bg); min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  .phone { width: 390px; background: var(--white); border-radius: 32px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.12); border: 1px solid var(--gray-border); display: flex; flex-direction: column; }
  .topbar { background: var(--green); padding: 20px; display: flex; align-items: center; gap: 14px; }
  .back-btn { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
  .topbar-title { color: white; font-size: 17px; font-weight: 500; }
  .page { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea { border: 1px solid var(--gray-border); border-radius: 10px; padding: 13px 14px; font-size: 14px; color: var(--text); background: var(--gray-bg); outline: none; font-family: 'DM Sans', sans-serif; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green); background: var(--white); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
  .field textarea { resize: none; height: 80px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .categories { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-pill { padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--gray-border); background: var(--gray-bg); color: var(--gray-text); cursor: pointer; transition: all 0.2s; }
  .cat-pill.active { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
  .urgent-toggle { border: 1px solid var(--gray-border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; background: var(--white); }
  .urgent-toggle.on { border-color: var(--red); background: var(--red-light); }
  .urgent-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--red-light); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .urgent-toggle.on .urgent-icon { background: var(--red); }
  .urgent-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .urgent-toggle.on .urgent-title { color: var(--red-dark); }
  .urgent-sub { font-size: 12px; color: var(--gray-text); margin-top: 2px; }
  .toggle-switch { margin-left: auto; width: 44px; height: 24px; border-radius: 12px; background: var(--gray-border); position: relative; transition: all 0.2s; flex-shrink: 0; }
  .toggle-switch.on { background: var(--red); }
  .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: white; transition: all 0.2s; }
  .toggle-switch.on .toggle-thumb { left: 22px; }
  .btn { border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: var(--green-dark); }
  .btn-green:active { transform: scale(0.98); }
  .preview { border: 1px solid var(--gray-border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; }
  .preview-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .preview-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .preview-sub { font-size: 12px; color: var(--gray-text); }
  .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-left: auto; }
  .badge.urgent { background: var(--red-light); color: var(--red-dark); }
  .badge.normal { background: var(--green-light); color: var(--green-dark); }
  .bottomnav { display: flex; background: var(--white); border-top: 1px solid var(--gray-border); padding: 8px 0 20px; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 0; }
  .nav-icon { width: 22px; height: 22px; }
  .nav-label { font-size: 10px; color: var(--gray-text); font-weight: 500; }
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2"><path d="M10 4L6 8l4 4"/></svg>
    </button>
    <div class="topbar-title">Ajouter un produit</div>
  </div>
  <div class="page">

    <div class="field">
      <label>Nom du produit</label>
      <input type="text" id="nom" placeholder="Ex : Lait entier, Pain de mie..." oninput="updatePreview()"/>
    </div>

    <div class="field">
      <label>Catégorie</label>
      <div class="categories">
        <div class="cat-pill active" onclick="selectCat(this)">Alimentation</div>
        <div class="cat-pill" onclick="selectCat(this)">Hygiène</div>
        <div class="cat-pill" onclick="selectCat(this)">Bébé</div>
        <div class="cat-pill" onclick="selectCat(this)">Maison</div>
        <div class="cat-pill" onclick="selectCat(this)">Autre</div>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Quantité</label>
        <input type="number" id="quantite" placeholder="1" min="1" value="1"/>
      </div>
      <div class="field">
        <label>Unité</label>
        <select id="unite">
          <option>unité(s)</option>
          <option>kg</option>
          <option>g</option>
          <option>L</option>
          <option>cl</option>
          <option>paquet(s)</option>
          <option>boîte(s)</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Note (optionnel)</label>
      <textarea placeholder="Ex : Prendre la marque habituelle..."></textarea>
    </div>

    <div class="urgent-toggle" id="urgentToggle" onclick="toggleUrgent()">
      <div class="urgent-icon" id="urgentIcon">⚠️</div>
      <div>
        <div class="urgent-title" id="urgentTitle">Signaler comme urgent</div>
        <div class="urgent-sub">Une alerte sera envoyée à tous les membres</div>
      </div>
      <div class="toggle-switch" id="toggleSwitch">
        <div class="toggle-thumb"></div>
      </div>
    </div>

    <div class="preview" id="preview">
      <div class="preview-icon">🛒</div>
      <div>
        <div class="preview-name" id="previewName">Nouveau produit</div>
        <div class="preview-sub" id="previewSub">1 unité(s) · Alimentation</div>
      </div>
      <span class="badge normal" id="previewBadge">Normal</span>
    </div>

    <button class="btn btn-green" onclick="ajouter()">Ajouter à la liste</button>
  </div>

  <div class="bottomnav">
    <div class="nav-item" onclick="window.location.href='tableau_de_bord.html'">
      <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="#888780" stroke-width="1.8"><rect x="3" y="3" width="16" height="16" rx="3"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="11" x2="15" y2="11"/><line x1="7" y1="14" x2="11" y2="14"/></svg>
      <span class="nav-label">Tableau</span>
    </div>
    <div class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="#1D9E75" stroke-width="1.8"><path d="M8 3H4v16h14V3h-4"/><rect x="8" y="1" width="6" height="4" rx="1"/><line x1="8" y1="10" x2="14" y2="10"/><line x1="8" y1="13" x2="12" y2="13"/></svg>
      <span class="nav-label" style="color:#1D9E75">Liste</span>
    </div>
    <div class="nav-item" onclick="window.location.href='rejoindre_famille.html'">
      <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="#888780" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3 19c0-3.5 2.7-6 6-6s6 2.5 6 6"/><circle cx="17" cy="9" r="2"/><path d="M17 14c2 0 3.5 1.5 3.5 3.5"/></svg>
      <span class="nav-label">Famille</span>
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="#888780" stroke-width="1.8"><path d="M11 2a7 7 0 017 7v3.5l1.5 2.5H2.5L4 12.5V9a7 7 0 017-7z"/><path d="M9 18a2 2 0 004 0"/></svg>
      <span class="nav-label">Alertes</span>
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 22 22" fill="none" stroke="#888780" stroke-width="1.8"><circle cx="11" cy="8" r="3"/><path d="M5 19c0-3.5 2.7-6 6-6s6 2.5 6 6"/></svg>
      <span class="nav-label">Profil</span>
    </div>
  </div>
</div>
<script>
  let isUrgent = false;
  let catActive = 'Alimentation';

  function toggleUrgent() {
    isUrgent = !isUrgent;
    const toggle = document.getElementById('urgentToggle');
    const sw = document.getElementById('toggleSwitch');
    const badge = document.getElementById('previewBadge');
    toggle.classList.toggle('on', isUrgent);
    sw.classList.toggle('on', isUrgent);
    if (isUrgent) { badge.className = 'badge urgent'; badge.textContent = 'Urgent'; }
    else { badge.className = 'badge normal'; badge.textContent = 'Normal'; }
  }

  function selectCat(el) {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    catActive = el.textContent;
    updatePreview();
  }

  function updatePreview() {
    const nom = document.getElementById('nom').value || 'Nouveau produit';
    const qty = document.getElementById('quantite').value || '1';
    const unite = document.getElementById('unite').value;
    document.getElementById('previewName').textContent = nom;
    document.getElementById('previewSub').textContent = qty + ' ' + unite + ' · ' + catActive;
  }

  function ajouter() {
    const nom = document.getElementById('nom').value;
    if (!nom) { alert('Veuillez entrer un nom de produit'); return; }
    window.location.href = 'consulter_liste.html';
  }
</script>
</body>
</html>

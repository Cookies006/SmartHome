<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartHome - Tableau de bord</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #0369A1;
            --primary-light: #E0F2FE;
            --primary-dark: #003D82;
            --secondary: #06B6D4;
            --accent: #0EA5E9;
            --danger: #DC2626;
            --bg-main: #F8FAFC;
            --bg-card: #FFFFFF;
            --bg-card-hover: #F1F5F9;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --border-color: #E2E8F0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.12);
            --glow: 0 0 20px rgba(3, 105, 161, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-primary);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px;
            scroll-behavior: smooth;
        }

        /* Scrollbar styling */
        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Header */
        #app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        #app-header h1 {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px;
            display: none;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        .btn-invite {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            transition: background 0.3s ease;
        }

        .btn-invite:hover {
            background: var(--primary-dark);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        #view-details {
            display: none;
        }

        /* Home Cards */
        .home-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .home-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .home-icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .home-info {
            flex: 1;
        }

        .home-info h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .home-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Member Cards */
        .member-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .member-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .member-avatar {
            font-size: 32px;
            flex-shrink: 0;
        }

        .member-info-text {
            flex: 1;
        }

        .member-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .member-role {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            position: sticky;
            bottom: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 12px;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: var(--primary);
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
</head>

<body>
    <header id="app-header"><button class="back-btn" id="backBtn" onclick="goBackToList()">←</button>
        <h1 id="headerTitle">Familles</h1><button class="btn-invite" id="inviteBtn">+ Inviter</button>
    </header>
    <main class="main-content">
        <div id="view-list">
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">Sélectionnez un foyer pour
                gérer ses membres.</p>
            <div class="home-card" onclick="openFamily('Maison Awa')">
                <div class="home-icon">
                    🏠
                </div>
                <div class="home-info">
                    <h3>Maison Awa</h3>
                    <p>2 membres • Administrateur</p>
                </div>
            </div>
            <div class="home-card" onclick="openFamily('Maison Khadija')">
                <div class="home-icon">
                    🏡
                </div>
                <div class="home-info">
                    <h3>Maison Khadija</h3>
                    <p>3 membres • Parent</p>
                </div>
            </div>
            <div class="home-card" style="border-style: dashed; background: transparent; justify-content: center;"
                onclick="alert('Créer un nouveau foyer')">
                <p style="color: var(--primary); font-weight: 700;">+ Créer un nouveau foyer</p>
            </div>
        </div>
        <div id="view-details">
            <div id="members-list"></div>
        </div>
    </main>
    <nav class="bottom-nav">
        <div class="nav-item"><span class="nav-icon">📊</span> Accueil
        </div>
        <div class="nav-item"><span class="nav-icon">🛒</span> Courses
        </div>
        <div class="nav-item active"><span class="nav-icon">👨‍👩‍👧‍👦</span> Familles
        </div>
    </nav>
    <script>
        const headerTitle = document.getElementById('headerTitle');
        const backBtn = document.getElementById('backBtn');
        const inviteBtn = document.getElementById('inviteBtn');
        const viewList = document.getElementById('view-list');
        const viewDetails = document.getElementById('view-details');
        const membersList = document.getElementById('members-list');

        function openFamily(familyName) {
            headerTitle.innerText = "Famille " + familyName.split(' ')[1];
            backBtn.style.display = "block";
            inviteBtn.style.display = "block";
            viewList.style.display = "none";
            viewDetails.style.display = "block";
            loadMembers(familyName);
        }

        function goBackToList() {
            headerTitle.innerText = "Familles";
            backBtn.style.display = "none";
            inviteBtn.style.display = "none";
            viewList.style.display = "block";
            viewDetails.style.display = "none";
        }

        function loadMembers(familyName) {
            if (familyName.includes('Awa')) {
                membersList.innerHTML = `
          <div class="member-card">
            <div class="member-avatar">👩</div>
            <div class="member-info-text">
              <p class="member-name">Julie (Vous)</p>
              <p class="member-role">Administrateur</p>
            </div>
          </div>
          <div class="member-card">
            <div class="member-avatar">👨</div>
            <div class="member-info-text">
              <p class="member-name">Thomas</p>
              <p class="member-role">Parent</p>
            </div>
          </div>
        `;
            } else {
                membersList.innerHTML = `
          <div class="member-card">
            <div class="member-avatar">👩</div>
            <div class="member-info-text"><p class="member-name">Julie</p><p class="member-role">Membre</p></div>
          </div>
          <div class="member-card">
            <div class="member-avatar">🧕</div>
            <div class="member-info-text"><p class="member-name">Khadija</p><p class="member-role">Administrateur</p></div>
          </div>
          <div class="member-card">
            <div class="member-avatar">👧</div>
            <div class="member-info-text"><p class="member-name">Aminata</p><p class="member-role">Enfant</p></div>
          </div>
        `;
            }
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartHome - Gestion des Foyers</title>
    <style>
        :root {
            --bg-app: #F8FAFC;
            --blue-soft: #6A8EAE;
            --blue-dark: #3E5C76;
            --blue-light: #F0F4F8;
            --blue-border: #D9E4EC;
            --text-dark: #2C3E50;
            --text-muted: #788A9C;
            --danger-color: #E63946;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background-color: var(--bg-app); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER STANDARD */
        header {
            background-color: var(--white);
            padding: 25px 24px 20px;
            border-bottom: 1px solid var(--blue-border);
            display: flex; align-items: center; justify-content: space-between;
            min-height: 80px;
        }
        header h1 { font-size: 22px; color: var(--text-dark); font-weight: 800; }
        .back-btn { display: none; background: none; border: none; font-size: 24px; margin-right: 15px; cursor: pointer; color: var(--text-dark); }
        .btn-invite { display: none; background-color: var(--blue-dark); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 700; }

        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; position: relative; }

        /* ================= ÉTAPE 1 : LISTE DES MAISONS ================= */
        .home-card {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--blue-border);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .home-card:active { transform: scale(0.98); background: var(--blue-light); }
        .home-icon { font-size: 30px; background: var(--blue-light); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .home-info h3 { font-size: 18px; color: var(--text-dark); margin-bottom: 4px; }
        .home-info p { font-size: 13px; color: var(--text-muted); }

        /* ================= ÉTAPE 2 : DÉTAILS DE LA FAMILLE ================= */
        #view-details { display: none; animation: fadeIn 0.3s ease; }
        
        .member-card {
            background-color: var(--white); padding: 16px; border-radius: 16px;
            border: 1px solid var(--blue-border); display: flex; align-items: center; gap: 16px; 
            margin-bottom: 12px;
        }
        .member-avatar { width: 44px; height: 44px; border-radius: 50%; background-color: var(--blue-light); display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .member-info-text { flex: 1; }
        .member-name { font-size: 15px; font-weight: 700; color: var(--text-dark); }
        .member-role { font-size: 12px; color: var(--text-muted); }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: var(--white); border-top: 1px solid var(--blue-border);
            display: flex; justify-content: space-around; padding: 12px;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 11px; }
        .nav-item.active { color: var(--blue-dark); font-weight: 700; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header id="app-header">
        <button class="back-btn" id="backBtn" onclick="goBackToList()">←</button>
        <h1 id="headerTitle">Familles</h1>
        <button class="btn-invite" id="inviteBtn">+ Inviter</button>
    </header>

    <main class="main-content">
        
        <div id="view-list">
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">Sélectionnez un foyer pour gérer ses membres.</p>
            
            <div class="home-card" onclick="openFamily('Maison Awa')">
                <div class="home-icon">🏠</div>
                <div class="home-info">
                    <h3>Maison Awa</h3>
                    <p>2 membres • Administrateur</p>
                </div>
            </div>

            <div class="home-card" onclick="openFamily('Maison Khadija')">
                <div class="home-icon">🏡</div>
                <div class="home-info">
                    <h3>Maison Khadija</h3>
                    <p>3 membres • Parent</p>
                </div>
            </div>

            <div class="home-card" style="border-style: dashed; background: transparent; justify-content: center;" onclick="alert('Créer un nouveau foyer')">
                <p style="color: var(--blue-dark); font-weight: 700;">+ Créer un nouveau foyer</p>
            </div>
        </div>

        <div id="view-details">
            <div id="members-list">
                </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item">
            <span class="nav-icon">📊</span> Accueil
        </div>
        <div class="nav-item">
            <span class="nav-icon">🛒</span> Courses
        </div>
        <div class="nav-item active">
            <span class="nav-icon">👨‍👩‍👧‍👦</span> Familles
        </div>
    </nav>

    <script>
        const headerTitle = document.getElementById('headerTitle');
        const backBtn = document.getElementById('backBtn');
        const inviteBtn = document.getElementById('inviteBtn');
        const viewList = document.getElementById('view-list');
        const viewDetails = document.getElementById('view-details');
        const membersList = document.getElementById('members-list');

        // Fonction pour ouvrir une famille spécifique
        function openFamily(familyName) {
            // 1. Mise à jour du Header
            headerTitle.innerText = "Famille " + familyName.split(' ')[1]; // Affiche "Famille Awa"
            backBtn.style.display = "block";
            inviteBtn.style.display = "block";

            // 2. Bascule des vues dans le body
            viewList.style.display = "none";
            viewDetails.style.display = "block";

            // 3. Chargement des membres (Simulation)
            loadMembers(familyName);
        }

        // Retour à la liste globale
        function goBackToList() {
            headerTitle.innerText = "Familles";
            backBtn.style.display = "none";
            inviteBtn.style.display = "none";
            viewList.style.display = "block";
            viewDetails.style.display = "none";
        }

        function loadMembers(familyName) {
            if(familyName.includes('Awa')) {
                membersList.innerHTML = `
                    <div class="member-card">
                        <div class="member-avatar">👩</div>
                        <div class="member-info-text">
                            <p class="member-name">Julie (Vous)</p>
                            <p class="member-role">Administrateur</p>
                        </div>
                    </div>
                    <div class="member-card">
                        <div class="member-avatar">👨</div>
                        <div class="member-info-text">
                            <p class="member-name">Thomas</p>
                            <p class="member-role">Parent</p>
                        </div>
                    </div>
                `;
            } else {
                membersList.innerHTML = `
                    <div class="member-card">
                        <div class="member-avatar">👩</div>
                        <div class="member-info-text"><p class="member-name">Julie</p><p class="member-role">Membre</p></div>
                    </div>
                    <div class="member-card">
                        <div class="member-avatar">🧕</div>
                        <div class="member-info-text"><p class="member-name">Khadija</p><p class="member-role">Administrateur</p></div>
                    </div>
                    <div class="member-card">
                        <div class="member-avatar">👧</div>
                        <div class="member-info-text"><p class="member-name">Aminata</p><p class="member-role">Enfant</p></div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

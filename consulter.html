<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartHome - Liste des produits</title>
    <style>
        :root {
            --bg-app: #F8FAFC;
            --blue-soft: #6A8EAE;
            --blue-dark: #3E5C76;
            --blue-light: #F0F4F8;
            --blue-border: #D9E4EC;
            --text-dark: #2C3E50;
            --text-muted: #788A9C;
            --urgent-color: #E63946;
            --urgent-bg: #FDECEC;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-app);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding-bottom: 70px; /* Espace pour la navigation du bas */
        }

        /* En-tête fixe */
        header {
            background-color: var(--white);
            padding: 20px 24px 10px 24px;
            border-bottom: 1px solid var(--blue-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        header h1 { font-size: 24px; color: var(--text-dark); font-weight: 800; }
        
        .profile-btn {
            background-color: var(--blue-light);
            border: 1px solid var(--blue-border);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px;
        }

        /* Onglets (À acheter / Historique) */
        .tabs {
            display: flex;
            gap: 20px;
        }

        .tab {
            padding-bottom: 10px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }

        .tab.active {
            color: var(--blue-dark);
            border-bottom-color: var(--blue-dark);
        }

        /* Filtres par catégories (Scroll horizontal) */
        .filters {
            display: flex;
            gap: 10px;
            padding: 16px 24px;
            overflow-x: auto;
            background-color: var(--bg-app);
        }

        .filters::-webkit-scrollbar { display: none; }

        .filter-chip {
            background-color: var(--white);
            border: 1px solid var(--blue-border);
            color: var(--text-dark);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .filter-chip.active {
            background-color: var(--blue-dark);
            color: var(--white);
            border-color: var(--blue-dark);
        }

        /* Liste de produits */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-card {
            background-color: var(--white);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--blue-border);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(106, 142, 174, 0.05);
            position: relative;
        }

        .product-card.is-urgent {
            border-left: 5px solid var(--urgent-color);
            background-color: #FFFDFD;
        }

        /* Checkbox pour "Marquer comme acheté" */
        .check-area {
            width: 26px; height: 26px;
            border: 2px solid var(--blue-border);
            border-radius: 8px; /* Carré arrondi pour se différencier des radios */
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            flex-shrink: 0;
            background-color: var(--bg-app);
        }

        .product-main { flex: 1; }

        .product-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .urgent-badge {
            font-size: 10px;
            background-color: var(--urgent-color);
            color: white;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .product-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .category-icon { font-size: 14px; }
        .quantity { font-weight: 700; color: var(--blue-dark); }

        /* Menu d'options (Supprimer / Signaler urgent) */
        .options-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-muted);
            padding: 4px;
            cursor: pointer;
        }

        /* Bouton Flottant (Ajouter) */
        .fab {
            position: fixed;
            bottom: 90px; /* Au-dessus de la navbar */
            right: 24px;
            background-color: var(--blue-dark);
            color: white;
            width: 60px; height: 60px;
            border-radius: 18px; /* Forme de squircle moderne */
            display: flex; justify-content: center; align-items: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(62, 92, 118, 0.3);
            border: none;
            cursor: pointer;
            z-index: 20;
        }

        /* Navigation du bas */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: var(--white);
            border-top: 1px solid var(--blue-border);
            display: flex;
            justify-content: space-around;
            padding: 12px 10px 15px 10px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 30;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-muted); text-decoration: none;
            font-size: 11px; width: 33%; 
        }

        .nav-item.active { color: var(--blue-dark); font-weight: 600; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; opacity: 0.7; }
        .nav-item.active .nav-icon { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>Liste de courses</h1>
            <button class="profile-btn">👨</button>
        </div>
        <div class="tabs">
            <div class="tab active">À acheter (4)</div>
            <div class="tab">Historique</div>
        </div>
    </header>

    <div class="filters">
        <div class="filter-chip active">Tout</div>
        <div class="filter-chip">🍎 Alimentation</div>
        <div class="filter-chip">🧻 Hygiène</div>
        <div class="filter-chip">🧹 Maison</div>
    </div>

    <main class="content">
        
        <div class="product-card is-urgent">
            <div class="check-area"></div>
            <div class="product-main">
                <div class="product-title-row">
                    <span class="product-name">Papier toilette</span>
                    <span class="urgent-badge">Urgent</span>
                </div>
                <div class="product-meta">
                    <span class="quantity">Qté: 1</span>
                    <span>•</span>
                    <span class="category-icon">🧻 Hygiène</span>
                </div>
            </div>
            <button class="options-btn">⋮</button>
        </div>

        <div class="product-card">
            <div class="check-area"></div>
            <div class="product-main">
                <div class="product-title-row">
                    <span class="product-name">Lait 1er âge</span>
                </div>
                <div class="product-meta">
                    <span class="quantity">Qté: 2</span>
                    <span>•</span>
                    <span class="category-icon">🍎 Alimentation</span>
                </div>
            </div>
            <button class="options-btn">⋮</button>
        </div>

        <div class="product-card">
            <div class="check-area"></div>
            <div class="product-main">
                <div class="product-title-row">
                    <span class="product-name">Sacs poubelle (30L)</span>
                </div>
                <div class="product-meta">
                    <span class="quantity">Qté: 1</span>
                    <span>•</span>
                    <span class="category-icon">🧹 Maison</span>
                </div>
            </div>
            <button class="options-btn">⋮</button>
        </div>

        <div class="product-card">
            <div class="check-area"></div>
            <div class="product-main">
                <div class="product-title-row">
                    <span class="product-name">Pommes Golden</span>
                </div>
                <div class="product-meta">
                    <span class="quantity">Qté: 6</span>
                    <span>•</span>
                    <span class="category-icon">🍎 Alimentation</span>
                </div>
            </div>
            <button class="options-btn">⋮</button>
        </div>

    </main>

    <button class="fab">+</button>

    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <span class="nav-icon">📊</span>
            Accueil
        </a>
        <a href="#" class="nav-item active">
            <span class="nav-icon">🛒</span>
            Courses
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">👨‍👩‍👧‍👦</span>
            Familles
        </a>
    </nav>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — FamilyPriority</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --gray-bg: #F5F5F2;
    --gray-border: #E8E6DE;
    --gray-text: #888780;
    --text: #1a1a18;
    --white: #ffffff;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
  }

  .phone {
    width: 390px;
    background: var(--white);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.12);
    border: 1px solid var(--gray-border);
    min-height: 700px;
    display: flex;
    flex-direction: column;
  }

  /* TOP */
  .top {
    background: var(--green);
    padding: 52px 28px 44px;
    text-align: center;
  }
  .logo-circle {
    width: 68px; height: 68px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .logo-inner {
    width: 40px; height: 40px; border-radius: 50%;
    background: white;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--green);
  }
  .app-name { color: white; font-size: 23px; font-weight: 600; margin-bottom: 4px; }
  .app-sub { color: var(--green-mid); font-size: 13px; }

  /* FORM */
  .form-area {
    padding: 28px 24px 32px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .form-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .form-sub { font-size: 13px; color: var(--gray-text); }

  /* ROLE PILLS */
  .role-row { display: flex; gap: 8px; }
  .role-pill {
    flex: 1; border: 1px solid var(--gray-border);
    border-radius: 20px; padding: 9px 12px;
    text-align: center; font-size: 13px; font-weight: 500;
    color: var(--gray-text); cursor: pointer;
    background: var(--gray-bg);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .role-pill.active {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green-dark);
  }
  .role-pill:hover:not(.active) { background: var(--white); }

  /* FIELDS */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px; font-weight: 600; color: var(--gray-text);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field input {
    border: 1px solid var(--gray-border);
    border-radius: 10px; padding: 13px 14px;
    font-size: 14px; color: var(--text);
    background: var(--gray-bg); outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .field input:focus {
    border-color: var(--green);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.1);
  }

  .forgot {
    font-size: 12px; color: var(--green);
    text-align: right; cursor: pointer;
    margin-top: -8px; font-weight: 500;
  }
  .forgot:hover { text-decoration: underline; }

  /* BUTTONS */
  .btn-login {
    background: var(--green); color: white;
    border: none; border-radius: var(--radius);
    padding: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; width: 100%;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-login:hover { background: var(--green-dark); }
  .btn-login:active { transform: scale(0.98); }

  .divider {
    display: flex; align-items: center; gap: 12px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--gray-border); }
  .divider-text { font-size: 12px; color: var(--gray-text); }

  .btn-register {
    background: var(--white); color: var(--text);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius); padding: 14px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    width: 100%; font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-register:hover { background: var(--gray-bg); }
  .btn-register:active { transform: scale(0.98); }

  .footer-text {
    font-size: 11px; color: var(--gray-text);
    text-align: center; margin-top: auto;
    line-height: 1.6;
  }

  /* ERROR */
  .error-msg {
    background: #FCEBEB; border: 1px solid #F7C1C1;
    border-radius: 8px; padding: 10px 14px;
    font-size: 12px; color: #A32D2D;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<div class="phone">

  <div class="top">
    <div class="logo-circle">
      <div class="logo-inner">
        <div class="logo-dot"></div>
      </div>
    </div>
    <div class="app-name">SmartHome</div>
    <div class="app-sub">Organiser sa maison c'est simplifier sa vie</div>
  </div>

  <div class="form-area">

    <div>
      <div class="form-title">Connexion</div>
      <div class="form-sub">Connectez-vous à votre compte famille</div>
    </div>

    <div class="role-row">
      <button class="role-pill active" onclick="selectRole(this)">Parent</button>
      <button class="role-pill" onclick="selectRole(this)">Membre</button>
    </div>

    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="fatou.diallo@email.com"/>
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <div class="forgot">Mot de passe oublié ?</div>

    <div class="error-msg" id="error">Email ou mot de passe incorrect. Veuillez réessayer.</div>

    <button class="btn-login" onclick="login()">Se connecter</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">ou</div>
      <div class="divider-line"></div>
    </div>

    <button class="btn-register" onclick="window.location.href='creer_famille.html'">Créer un compte</button>

    <div class="footer-text">En vous connectant, vous acceptez les<br>conditions d'utilisation de SmartHome</div>

  </div>
</div>

<script>
  function selectRole(el) {
    document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
  }

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const error = document.getElementById('error');
    if (!email || !password) {
      error.classList.add('show');
    } else {
      error.classList.remove('show');
      window.location.href = 'tableau_de_bord.html';
    }
  }

  document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
  });
</script>

</body>
</html>
